<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body { font-family:'Poppins',sans-serif; margin:0; }
header { background:#4CAF50; color:white; padding:20px; text-align:center; }
nav a { color:white; margin:0 15px; text-decoration:none; font-weight:600; }

section { padding:80px 20px; max-width:600px; margin:auto; }

input, textarea {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:5px;
  border:1px solid #ccc;
}

button {
  padding:12px 25px;
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover { transform:scale(1.05); }

.error { color:red; font-size:14px; }
.success { color:green; margin-top:10px; }
</style>
</head>

<body>

<header>
  <h1>Contact Us</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </nav>
</header>

<section>
  <form id="form">
    <input type="text" id="name" placeholder="Your Name">
    <div id="nameError" class="error"></div>

    <input type="email" id="email" placeholder="Your Email">
    <div id="emailError" class="error"></div>

    <textarea id="message" placeholder="Your Message"></textarea>
    <div id="msgError" class="error"></div>

    <button id="btn">Send Message</button>
    <div id="successMsg" class="success"></div>
  </form>
</section>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  let valid = true;

  const name = document.getElementById("name");
  const email = document.getElementById("email");
  const message = document.getElementById("message");

  document.getElementById("nameError").textContent = "";
  document.getElementById("emailError").textContent = "";
  document.getElementById("msgError").textContent = "";

  if(name.value === ""){
    document.getElementById("nameError").textContent = "Name required";
    valid = false;
  }

  if(!email.value.includes("@")){
    document.getElementById("emailError").textContent = "Valid email required";
    valid = false;
  }

  if(message.value.length < 5){
    document.getElementById("msgError").textContent = "Message too short";
    valid = false;
  }

  if(valid){
    const btn = document.getElementById("btn");
    btn.textContent = "Sending...";
    btn.disabled = true;

    setTimeout(() => {
      btn.textContent = "Send Message";
      btn.disabled = false;
      document.getElementById("successMsg").textContent = "Message sent successfully!";
      document.getElementById("form").reset();
    }, 1500);
  }
});
</script>

</body>
</html>
