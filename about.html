<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body { font-family:'Poppins',sans-serif; margin:0; }
header { background:#4CAF50; color:white; padding:20px; text-align:center; }
nav a { color:white; margin:0 15px; text-decoration:none; font-weight:600; }

section {
  padding:80px 20px;
  max-width:1000px;
  margin:auto;
  opacity:0;
  transform:translateY(30px);
  transition:0.6s;
}

section.show {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<header>
  <h1>About Us</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section>
  <h2>Who We Are</h2>
  <p>We are passionate developers focused on creating clean and modern web experiences.</p>

  <h2>Our Mission</h2>
  <p>To help businesses grow through technology and smart design.</p>
</section>

<script>
const section = document.querySelector("section");

window.addEventListener("scroll", () => {
  const top = section.getBoundingClientRect().top;
  if(top < window.innerHeight - 100){
    section.classList.add("show");
  }
});
</script>

</body>
</html>
